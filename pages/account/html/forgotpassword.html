<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu</title>
    <link rel="stylesheet" href="/src/css/main.css">
    <link rel="stylesheet" href="../css/RegisterNLogin.css">
</head>
<body>
    <a href="../../../index.html" class="back-home-circle">
        <i class="fa-solid fa-house"></i>
    </a>

    <div class="auth-wrapper">
        <div class="container">
            <div class="form-box" style="display: block;">
                <div id="messageBox" class="message"></div>

                <div id="step1">
                    <h2>Quên mật khẩu</h2>
                    <input type="email" id="resetEmail" placeholder="Địa chỉ Email" required>
                    <button onclick="guiMa()">Gửi mã</button>
                    <p><a href="../html/Login.html">← Quay lại đăng nhập</a></p>
                </div>

                <div id="step2" style="display:none;">
                    <h2>Nhập mã xác nhận</h2>
                    <input type="text" id="otpInput" placeholder="Nhập mã 6 số" maxlength="6" inputmode="numeric">
                    <button onclick="xacNhanMa()">Xác nhận</button>
                    <p><a href="#" onclick="document.getElementById('step2').style.display='none'; document.getElementById('step1').style.display='block'; return false;">← Thay đổi email</a></p>
                </div>

                <div id="step3" style="display:none;">
                    <h2>Đặt mật khẩu mới</h2>
                    <input type="password" id="matkhauMoi" placeholder="Mật khẩu mới">
                    <input type="password" id="xacNhanMatkhau" placeholder="Xác nhận mật khẩu mới">
                    <button onclick="doiMatkhau()">Xác nhận</button>
                    <p><a href="../html/Login.html">← Quay lại đăng nhập</a></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/js/main.js"></script>
    <script src="../js/forgotpassword.js"></script>
</body>
</html>
