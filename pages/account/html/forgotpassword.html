<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/RegisterNLogin.css">
</head>
<body>
    <div class="container">
        <div class="form-box" style="display: block;">
            <div id="messageBox" class="message"></div>

            <form onsubmit="doiMatkhau(event)">
                <h2>Đổi mật khẩu</h2>
                <input type="email" id="resetEmail" placeholder="Địa chỉ Email" required>
                <input type="password" id="matkhauMoi" placeholder="Mật khẩu mới">
                <input type="password" id="xacNhanMatkhau" placeholder="Xác nhận mật khẩu mới">
                <button type="submit">Xác nhận</button>
                <p><a href="../html/Login.html">← Quay lại đăng nhập</a></p>
            </form>

        </div>
    </div>

    <script src="../js/forgotpassword.js"></script>
</body>
</html>
