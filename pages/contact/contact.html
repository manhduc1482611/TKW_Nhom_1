<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nghien Beauty - Liên hệ</title>
    <link rel="stylesheet" href="/src/css/main.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="header"></div>

<main>
    <section class="contact-banner">
        <div class="breadcrumb">
            <a href="../../../index.html">
                <i class="fa-solid fa-house"></i>
                Trang chủ
            </a>
            <span>/</span>
            <span>Liên hệ</span>
        </div>
        <h1>LIÊN HỆ</h1>
        <p>Nghien Beauty luôn sẵn sàng lắng nghe và hỗ trợ giải đáp mọi thắc mắc của bạn</p>
    </section>

    <section class="contact-layout">
        <div class="contact-container">
            <div class="left-box">
                <div class="contact-info">
                    <h3>Thông tin liên hệ</h3>
                    <p><i class="fas fa-phone"></i> +84 123 456 789</p>
                    <p><i class="fas fa-envelope"></i> NghienBeauty@gmail.com</p>
                    <p><i class="fas fa-map-marker-alt"></i> 12 Chùa Bộc, Hà Nội</p>
                </div>

                <div class="contact-form">
                    <h3>Bạn cần hỗ trợ?</h3>
                    <form id="contactForm" novalidate>
                        <input type="text" id="name" placeholder="Họ và tên" required>
                        <input type="email" id="email" placeholder="Địa chỉ Email" required>
                        <textarea id="message" placeholder="Nội dung tin nhắn..." required></textarea>
                        <div class="form-footer">
                            <button type="submit" id="sendBtn">Gửi tin nhắn</button>
                            <div id="formMessage" class="form-message hidden"></div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="map-box">
                <iframe
                    src="https://www.google.com/maps?q=21.008748,105.826121&z=15&output=embed"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </section>
</main>

<div id="footer"></div>
<script type="module" src="/src/js/main.js"></script>
<script src="contact.js"></script>
</body>
</html>
