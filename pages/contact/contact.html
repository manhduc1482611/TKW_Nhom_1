<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ | Nghien Beauty</title>
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="/src/css/main.css">
</head>

<body>
<div id="header"></div>
    <section class="banner">
        <div class="banner-content">
            <h1>Liên hệ</h1>
        </div>
    </section>

    <section class="contact">
        <div class="contact-container">
            <div class="left-box">
                <div class="contact-info">
                    <h3>Thông tin liên hệ</h3>
                    <p><i class="fas fa-phone"></i> 0966969726</p>
                    <p><i class="fas fa-envelope"></i> manhduc114488@gmail.com</p>
                    <p><i class="fas fa-map-marker-alt"></i> 12 Chùa Bộc, Hà Nội</p>
                </div>

                <div class="contact-form">
                    <h3>Bạn cần hỗ trợ?</h3>
                    <!-- Thuộc tính required là bắt buộc để hiện thông báo -->
                    <input type="text" id="name" placeholder="Họ và tên" required>
                    <input type="email" id="email" placeholder="Địa chỉ Email" required>
                    <textarea id="message" placeholder="Nội dung tin nhắn..." required></textarea>
                    <button id="sendBtn">Gửi</button>

                </div>
            </div>

            <div class="map-box">
                <iframe src="https://www.google.com/maps?q=21.008748,105.826121&z=15&output=embed"
                    allowfullscreen=""></iframe>
            </div>
        </div>
    </section>
    <div id="footer"></div>
    <script type="module" src="/src/js/main.js"></script>
    <script src="contact.js"></script>
</body>

</html>
