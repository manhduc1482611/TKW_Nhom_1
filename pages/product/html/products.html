<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tất cả sản phẩm</title>
    <link class="jsbin" href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.4/themes/smoothness/jquery-ui.css"
        rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="../css/products.css">
    <link rel="stylesheet" href="/src/css/main.css">
</head>

<body>

    <div id="header"></div>

    <section class="products-banner">
        <div class="breadcrumb">
            <a href="../../../index.html">
                <i class="fa-solid fa-house"></i> Trang chủ
            </a>
            <span>/</span>
            <span id="breadcrumbTitle">Sản phẩm</span>
        </div>
        <h1 id="pageTitle">TẤT CẢ SẢN PHẨM</h1>
    </section>

    <main class="products-layout">
        <aside class="products-sidebar">
            <div class="sidebar-box">
                <h3>Danh mục</h3>
                <ul>
                    <li class="active-category">Tất cả sản phẩm</li>
                    <li>Sữa rửa mặt</li>
                    <li>Tonner</li>
                    <li>Kem dưỡng</li>
                    <li>Kem chống nắng</li>
                    <li>Nước tẩy trang</li>
                </ul>
            </div>

            <!-- Suggested products / Sản phẩm gợi ý -->
            <div class="sidebar-suggestions">
                <h3>Sản phẩm gợi ý</h3>
                <div class="related-list" id="suggestionList"></div>
            </div>
        </aside>

        <section class="products-content">
            <div class="products-toolbar">
                <div class="toolbar-left">
                    <h2 id="toolbarTitle">Tất cả sản phẩm</h2>
                </div>

                <div class="toolbar-right">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Tìm sản phẩm...">
                    </div>

                    <select id="brandFilter">
                        <option value="all">Thương hiệu</option>
                        <option value="Skin1004">Skin1004</option>
                        <option value="La Roche-Posay">La Roche-Posay</option>
                        <option value="Bioderma">Bioderma</option>
                        <option value="CeraVe">CeraVe</option>
                        <option value="SVR">SVR</option>
                        <option value="Avène">Avène</option>
                        <option value="Eucerin">Eucerin</option>
                        <option value="Senka">Senka</option>
                        <option value="Vichy">Vichy</option>
                        <option value="Some By Mi">Some By Mi</option>
                        <option value="Cocoon">Cocoon</option>
                        <option value="Hada Labo">Hada Labo</option>
                        <option value="Innisfree">Innisfree</option>
                        <option value="Simple">Simple</option>
                    </select>

                    <select id="sortPrice">
                        <option value="default">Sắp xếp giá</option>
                        <option value="low-high">Giá tăng dần</option>
                        <option value="high-low">Giá giảm dần</option>
                    </select>
                </div>
            </div>

            <div class="products-grid" id="productsGrid"></div>

            <div class="pagination" id="pagination"></div>
        </section>
    </main>
    <div id="chatbot"></div>
    <div id="footer"></div>

    <script type="module" src="/src/js/main.js"></script>
    <script src="../js/products.js"></script>
</body>

</html>
