<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tất cả sản phẩm</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/products.css">
<link rel="stylesheet" href="../../../css/main.css">
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- GOOGLE FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- HEADER -->
    <iframe 
        src="../../../components/header.html"
        class="header-frame"
    ></iframe>

    <!-- PAGE BANNER -->
    <section class="products-banner">

        <!-- breadcrumb -->
        <div class="breadcrumb">

            <a href="../../../index.html">
                <i class="fa-solid fa-house"></i>
                Trang chủ
            </a>

            <span>/</span>

<span id="breadcrumbTitle">
    Sản phẩm
</span>
        </div>

        <!-- title -->
        <h1 id="pageTitle">TẤT CẢ SẢN PHẨM</h1>

    </section>

    <!-- MAIN -->
    <main class="products-layout">

        <!-- SIDEBAR -->
        <aside class="products-sidebar">

            <div class="sidebar-box">

                <h3>Danh mục</h3>

                <ul>

                    <li class="active-category">
                        Tất cả sản phẩm
                    </li>

                    <li>Sữa rửa mặt</li>

                    <li>Toner</li>

                    <li>Kem dưỡng</li>

                    <li>Kem chống nắng</li>

                    <li>Nước tẩy trang</li>

                </ul>

            </div>

        </aside>

        <!-- CONTENT -->
        <section class="products-content">

            <!-- TOOLBAR -->
            <div class="products-toolbar">

                <!-- left -->
                <div class="toolbar-left">

                    <h2 id="toolbarTitle">Tất cả sản phẩm</h2>

                </div>

                <!-- right -->
                <div class="toolbar-right">

                    <!-- search -->
                    <div class="search-box">

                        <i class="fa-solid fa-magnifying-glass"></i>

                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Tìm sản phẩm..."
                        >

                    </div>


                    <!-- brand -->
                    <select id="brandFilter">

                        <option value="all">
                            Thương hiệu
                        </option>

                        <option value="Skin1004">Skin1004</option>

                        <option value="La Roche-Posay">
                            La Roche-Posay
                        </option>

                        <option value="Bioderma">
                            Bioderma
                        </option>

                        <option value="CeraVe">
                            CeraVe
                        </option>

                        <option value="SVR">
                            SVR
                        </option>

                        <option value="Avène">
                            Avène
                        </option>

                        <option value="Eucerin">
                            Eucerin
                        </option>

                        <option value="Senka">
                            Senka
                        </option>

                        <option value="Vichy">
                            Vichy
                        </option>

                        <option value="Some By Mi">
                            Some By Mi
                        </option>

                        <option value="Cocoon">
                            Cocoon
                        </option>

                        <option value="Hada Labo">
                            Hada Labo
                        </option>

                        <option value="Innisfree">
                            Innisfree
                        </option>

                        <option value="Simple">
                            Simple
                        </option>

                    </select>

                    <!-- sort -->
                    <select id="sortPrice">

                        <option value="default">
                            Sắp xếp giá
                        </option>

                        <option value="low-high">
                            Giá tăng dần
                        </option>

                        <option value="high-low">
                            Giá giảm dần
                        </option>

                    </select>

                </div>

            </div>

            <!-- PRODUCTS -->
            <div 
                class="products-grid"
                id="productsGrid"
            >

            </div>
<!-- PAGINATION -->

<div class="pagination" id="pagination">

</div>
        </section>

    </main>

    <!-- FOOTER -->
    <iframe src="../../../components/footer.html" class="footer-frame"></iframe>
<script src="../../../js/main.js"></script>
<script src="../js/products.js"></script>

</body>
</html>
