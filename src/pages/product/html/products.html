<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tất cả sản phẩm</title>

<link rel="stylesheet" href="/src/pages/product/css/products.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../css/main.css">
</head>
<body>

    <!-- HEADER -->
     <iframe src="../../../components/header.html" class="header-frame"></iframe>

    <!-- MAIN -->
    <main class="products-page">

        <!-- breadcrumb -->
        <section class="breadcrumb">
            <a href="../../../index.html">Trang chủ</a>
            <span>/</span>
            <span>Sản phẩm</span>
        </section>

        <!-- title -->
        <section class="page-title">
            <h2>TẤT CẢ SẢN PHẨM</h2>
            <p>Khám phá các sản phẩm chăm sóc da chính hãng</p>
        </section>

        <!-- filter -->
        <section class="products-toolbar">

            <!-- search -->
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Tìm sản phẩm..."
                >
            </div>

            <!-- category -->
            <div class="filter-box">
                <select id="categoryFilter">
                    <option value="all">Tất cả danh mục</option>
                    <option value="Sữa rửa mặt">Sữa rửa mặt</option>
                    <option value="Kem dưỡng">Kem dưỡng</option>
                    <option value="Tonner">Tonner</option>
                    <option value="Kem chống nắng">Kem chống nắng</option>
                    <option value="Nước tẩy trang">Nước tẩy trang</option>
                </select>
            </div>
            <!-- brand -->
<div class="filter-box">

<select id="brandFilter">

    <option value="all">
        Tất cả thương hiệu
    </option>

    <option value="Skin1004">
        Skin1004
    </option>

    <option value="La Roche-Posay">
        La Roche-Posay
    </option>

    <option value="Bioderma">
        Bioderma
    </option>

    <option value="CeraVe">
        CeraVe
    </option>

    <option value="SVR">
        SVR
    </option>

    <option value="Avène">
        Avène
    </option>

    <option value="Eucerin">
        Eucerin
    </option>

    <option value="Senka">
        Senka
    </option>

    <option value="Vichy">
        Vichy
    </option>

    <option value="Some By Mi">
        Some By Mi
    </option>

    <option value="Cocoon">
        Cocoon
    </option>

    <option value="Hada Labo">
        Hada Labo
    </option>
    <option value="Innisfree">
        Innisfree
    </option>
    <option value="Simple">
        Simple
    </option>
</select>
</div>
            <!-- sort -->
            <div class="sort-box">
                <select id="sortPrice">
                    <option value="default">Sắp xếp giá</option>
                    <option value="low-high">Giá tăng dần</option>
                    <option value="high-low">Giá giảm dần</option>
                </select>
            </div>

        </section>

        <!-- products -->
        <section class="products-container">

            <!-- render bằng JS -->
            <div class="products-grid" id="productsGrid">

            </div>

        </section>

    </main>

    <!-- FOOTER -->
    <iframe src="../../../components/footer.html" class="footer-frame"></iframe>

<script src="../js/products.js"></script>
</body>
</html>
