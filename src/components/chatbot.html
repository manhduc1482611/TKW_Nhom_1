<div class="chatbot-wrapper">
    <button class="chatbot-toggle-btn" id="chatbotToggleBtn" title="Trợ lý ảo Đức Tùng Beauty">
        <i class="fas fa-comments"></i>
        <span class="notification-dot"></span>
    </button>

    <div class="chatbot-box" id="chatbotBox">
        <div class="chatbot-header">
            <div class="chatbot-info">
                <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" alt="Logo" class="bot-avatar-header">
                <div>
                    <h4>Đức Tùng Beauty Bot</h4>
                    <span class="status-online"><span class="dot"></span> Đang hoạt động</span>
                </div>
            </div>
            <button class="chatbot-close-btn" id="chatbotCloseBtn">&times;</button>
        </div>

        <div class="chatbot-messages" id="chatbotMessages">
            </div>

        <div class="chatbot-options" id="chatbotOptions">
            </div>

        <div class="chatbot-input-container">
            <input type="text" id="chatbotInput" placeholder="Nhập câu hỏi của bạn tại đây..." autocomplete="off">
            <button id="chatbotSendBtn" title="Gửi tin nhắn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>

        <div class="chatbot-footer">
            <p>© Đức Tùng Beauty - Hỗ trợ tự động 24/7</p>
        </div>
    </div>
</div>
